apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: samehyahia/myapp1:${BUILD_NUMBER}  # متغير بييجي من Jenkins
        ports:
        - containerPort: 8080
        env:
        - name: APP_VERSION
          value: "1.0.${BUILD_NUMBER}"